name: release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: cache pnpm store
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-store-20-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-20-
            ${{ runner.os }}-pnpm-store-

      - name: install
        run: pnpm install --frozen-lockfile
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: test
        run: pnpm test

      - name: get previous tag
        id: prev
        run: |
          prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "tag=$prev_tag" >> "$GITHUB_OUTPUT"

      - name: semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      - name: get current tag
        id: tag
        run: |
          git fetch --tags --force
          current_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "tag=$current_tag" >> "$GITHUB_OUTPUT"
          if [ -n "$current_tag" ] && [ "$current_tag" != "${{ steps.prev.outputs.tag }}" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: setup qemu
        if: steps.tag.outputs.published == 'true'
        uses: docker/setup-qemu-action@v3

      - name: setup buildx
        if: steps.tag.outputs.published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: login ghcr
        if: steps.tag.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: login docker hub
        if: steps.tag.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: docker metadata
        if: steps.tag.outputs.published == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest

      - name: build and push
        if: steps.tag.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
