# Docker Compose - Docker Hub Image + Environment Variables from .env file
# Usage: docker-compose -f docker-compose.hub-env.yml up


services:
  whatsapp-ai-bot:
    image: isyuricunha/whatsapp-ai-bot:latest
    container_name: whatsapp-ai-bot-hub-env
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable
    volumes:
      - /whatsapp-ai/whatsapp_sessions:/usr/src/app/.wwebjs_auth
      - /whatsapp-ai/app_data:/usr/src/app/data
      - ./config.json:/usr/src/app/config.json:ro
    shm_size: 2gb
    networks:
      - whatsapp-network
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('Health check passed')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  whatsapp_sessions:
    driver: local
  app_data:
    driver: local

networks:
  whatsapp-network:
    driver: bridge
