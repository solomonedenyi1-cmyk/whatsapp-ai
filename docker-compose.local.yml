services:
  whatsapp-ai:
    build:
      context: ${WHATSAPP_AI_REPO_PATH:-/home/cloud/not-safe/github/whatsapp-ai}
      dockerfile: Dockerfile
    image: whatsapp-ai:local
    pull_policy: never
    container_name: whatsapp-ai
    restart: unless-stopped
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-your_mistral_api_key}
      MISTRAL_AGENT_ID: ${MISTRAL_AGENT_ID:-ag_your_agent_id}

      MISTRAL_USE_CONVERSATIONS: ${MISTRAL_USE_CONVERSATIONS:-"true"}
      MISTRAL_CONVERSATION_STORE: ${MISTRAL_CONVERSATION_STORE:-"true"}
      MISTRAL_CONVERSATION_HANDOFF_EXECUTION: ${MISTRAL_CONVERSATION_HANDOFF_EXECUTION:-"server"}

      CAL_API_KEY: ${CAL_API_KEY:-your_cal_api_key}
      CAL_EVENT_TYPE_ID: ${CAL_EVENT_TYPE_ID:-"your_event_type_id"}
      CAL_API_URL: ${CAL_API_URL:-"https://api.cal.com"}
      CAL_API_VERSION: ${CAL_API_VERSION:-"2024-08-13"}
      CAL_DEFAULT_TIME_ZONE: ${CAL_DEFAULT_TIME_ZONE:-"America/Sao_Paulo"}

      RESEND_API_KEY: ${RESEND_API_KEY:-your_resend_api_key}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-"Your Company"}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-"noreply@yourdomain.com"}

      BOT_NAME: ${BOT_NAME:-"WhatsApp AI Bot"}
      MAX_CONTEXT_MESSAGES: ${MAX_CONTEXT_MESSAGES:-"20"}
      MESSAGE_SPLIT_LENGTH: ${MESSAGE_SPLIT_LENGTH:-"1500"}

      WHATSAPP_SESSION_PATH: /app/session
      PUPPETEER_HEADLESS: ${PUPPETEER_HEADLESS:-"true"}
      PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH:-/usr/bin/chromium}

      NODE_ENV: ${NODE_ENV:-production}
      DEBUG: ${DEBUG:-"false"}

      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER:-551234567890@c.us}

    volumes:
      - ${HOME}/docker/docker-data/whatsapp-ai/whatsapp_ai_session:/app/session
      - ${HOME}/docker/docker-data/whatsapp-ai/whatsapp_ai_data:/app/data
