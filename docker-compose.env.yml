# WhatsApp AI Bot - Docker Compose Configuration
# Build from source with environment variables from .env file

version: '3.8'

services:
  whatsapp-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-ai-bot
    restart: unless-stopped
    
    # Load environment variables from .env file
    env_file:
      - .env
    
    # Volume mounts for data persistence
    volumes:
      # Configuration file (create from config.example.json)
      - ./config.json:/usr/src/app/config.json:ro
      
      # Data persistence
      - whatsapp_data:/usr/src/app/data
      - whatsapp_logs:/usr/src/app/logs
      - whatsapp_session:/usr/src/app/.wwebjs_auth
      - whatsapp_chrome:/usr/src/app/.chrome_user_data
    
    # Security options
    security_opt:
      - seccomp:unconfined
    
    # Shared memory for Chrome
    shm_size: 2gb
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-m", "whatsapp_ai.main", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Named volumes for data persistence
volumes:
  whatsapp_data:
    driver: local
  whatsapp_logs:
    driver: local
  whatsapp_session:
    driver: local
  whatsapp_chrome:
    driver: local

# Network configuration
networks:
  default:
    name: whatsapp-ai-network
