services:
  whatsapp-ai:
    image: ghcr.io/isyuricunha/whatsapp-ai:latest
    container_name: whatsapp-ai
    restart: unless-stopped
    environment:
      MISTRAL_API_KEY: your_mistral_api_key
      MISTRAL_AGENT_ID: ag_your_agent_id

      MISTRAL_USE_CONVERSATIONS: "true"
      MISTRAL_CONVERSATION_STORE: "true"
      MISTRAL_CONVERSATION_HANDOFF_EXECUTION: "server"

      CAL_API_KEY: your_cal_api_key
      CAL_EVENT_TYPE_ID: "your_event_type_id"
      CAL_API_URL: "https://api.cal.com"
      CAL_API_VERSION: "2024-08-13"
      CAL_DEFAULT_TIME_ZONE: "America/Sao_Paulo"

      RESEND_API_KEY: your_resend_api_key
      RESEND_FROM_NAME: "Your Company"
      RESEND_FROM_EMAIL: "noreply@yourdomain.com"

      BOT_NAME: "WhatsApp AI Bot"
      MAX_CONTEXT_MESSAGES: "20"
      MESSAGE_SPLIT_LENGTH: "1500"

      WHATSAPP_SESSION_PATH: /app/session
      PUPPETEER_HEADLESS: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium

      NODE_ENV: production
      DEBUG: "false"

      ADMIN_WHATSAPP_NUMBER: 551234567890@c.us

    volumes:
      - whatsapp_ai_session:/app/session
      - whatsapp_ai_data:/app/data

volumes:
  whatsapp_ai_session:
  whatsapp_ai_data:
