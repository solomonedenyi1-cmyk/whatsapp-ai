# WhatsApp AI Bot - Docker Compose Configuration
# Build from source with environment variables inline

version: '3.8'

services:
  whatsapp-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-ai-bot
    restart: unless-stopped
    
    # Environment variables (edit these values)
    environment:
      # Admin Configuration
      - ADMIN_WHATSAPP_NUMBER=5511987654321@c.us
      
      # AI Configuration - Choose your provider
      - AI_PROVIDER=openai
      
      # OpenAI Configuration (if using OpenAI)
      - OPENAI_API_KEY=your_openai_api_key_here
      - OPENAI_MODEL=gpt-4-turbo-preview
      
      # Anthropic Configuration (if using Anthropic)
      - ANTHROPIC_API_KEY=your_anthropic_api_key_here
      - ANTHROPIC_MODEL=claude-3-sonnet-20240229
      
      # Ollama Configuration (if using Ollama)
      - OLLAMA_API_URL=http://host.docker.internal:11434/v1
      - OLLAMA_MODEL=llama3.1:8b
      
      # Bot Configuration
      - BOT_NAME=WhatsApp AI Assistant
      - DEBUG=false
      - LOG_LEVEL=INFO
      
      # Chrome Configuration for Docker
      - CHROME_HEADLESS=true
      - CHROME_NO_SANDBOX=true
      - CHROME_DISABLE_GPU=true
    
    # Volume mounts for data persistence
    volumes:
      # Configuration file (create from config.example.json)
      - ./config.json:/usr/src/app/config.json:ro
      
      # Data persistence
      - whatsapp_data:/usr/src/app/data
      - whatsapp_logs:/usr/src/app/logs
      - whatsapp_session:/usr/src/app/.wwebjs_auth
      - whatsapp_chrome:/usr/src/app/.chrome_user_data
    
    # Security options
    security_opt:
      - seccomp:unconfined
    
    # Shared memory for Chrome
    shm_size: 2gb
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-m", "whatsapp_ai.main", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Named volumes for data persistence
volumes:
  whatsapp_data:
    driver: local
  whatsapp_logs:
    driver: local
  whatsapp_session:
    driver: local
  whatsapp_chrome:
    driver: local

# Network configuration
networks:
  default:
    name: whatsapp-ai-network
